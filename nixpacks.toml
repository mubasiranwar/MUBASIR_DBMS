[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.zip", "php83Extensions.gd", "php83Extensions.curl", "php83Extensions.tokenizer", "php83Extensions.bcmath", "php83Extensions.fileinfo", "composer", "nodejs_20", "npm-9_x"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci",
  "npm run build"
]

[phases.build]
cmds = []

[start]
cmd = "bash start.sh"
